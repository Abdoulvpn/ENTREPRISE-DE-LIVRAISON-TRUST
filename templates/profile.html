{% extends "base.html" %}
{% block title %}Mon profil — TrustDelivery{% endblock %}
{% block page_title %}Mon profil{% endblock %}
{% block content %}

<div class="td-card" style="max-width:480px;">
  <p class="td-muted mb-3">Rôle : <span class="td-badge td-role-{{ current_user.role }}">{{ role_label(current_user.role) }}</span></p>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Nom complet</label>
      <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
    </div>
    <div class="mb-3">
      <label class="form-label">Téléphone</label>
      <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
    </div>
    <hr class="td-divider">
    <p class="td-muted" style="font-size:13px;">Laisser les champs ci-dessous vides pour ne pas changer le mot de passe.</p>
    <div class="mb-3">
      <label class="form-label">Mot de passe actuel</label>
      <input type="password" name="current_password" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Nouveau mot de passe</label>
      <input type="password" name="new_password" class="form-control">
    </div>
    <button type="submit" class="btn td-btn-primary">Enregistrer</button>
  </form>
</div>
{% endblock %}
