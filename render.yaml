services:
  - type: web
    name: trustdelivery
    runtime: python
    runtimeVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/trustdelivery.db
      - key: REQUIRE_PERSISTENT_DATABASE
        value: "1"
    disk:
      name: trustdelivery-disk
      mountPath: /var/data
      sizeGB: 1
