name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL HTTPS de TrustDelivery (optionnelle, sinon demandée au premier lancement)"
        required: false
        type: string
      firebase_application_id:
        description: "Firebase Mobile App ID (optionnel pour les notifications push)"
        required: false
        type: string
      firebase_api_key:
        description: "Firebase Web API Key"
        required: false
        type: string
      firebase_project_id:
        description: "Firebase Project ID"
        required: false
        type: string
      firebase_sender_id:
        description: "Firebase Project Number / Sender ID"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Construire l’APK
        working-directory: android-app
        env:
          SITE_URL: ${{ inputs.site_url }}
          FIREBASE_APPLICATION_ID: ${{ inputs.firebase_application_id }}
          FIREBASE_API_KEY: ${{ inputs.firebase_api_key }}
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id }}
          FIREBASE_SENDER_ID: ${{ inputs.firebase_sender_id }}
        run: >-
          gradle :app:assembleDebug
          -PTRUSTDELIVERY_URL="$SITE_URL"
          -PFIREBASE_APPLICATION_ID="$FIREBASE_APPLICATION_ID"
          -PFIREBASE_API_KEY="$FIREBASE_API_KEY"
          -PFIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID"
          -PFIREBASE_SENDER_ID="$FIREBASE_SENDER_ID"
          --stacktrace

      - name: Préparer le fichier
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk TrustDelivery.apk

      - name: Publier l’APK
        uses: actions/upload-artifact@v4
        with:
          name: TrustDelivery-Android
          path: TrustDelivery.apk
          if-no-files-found: error
          retention-days: 30
