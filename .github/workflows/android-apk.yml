name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL HTTPS de TrustDelivery (optionnelle, sinon demandée au premier lancement)"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Construire l’APK
        working-directory: android-app
        env:
          SITE_URL: ${{ inputs.site_url }}
        run: gradle :app:assembleDebug -PTRUSTDELIVERY_URL="$SITE_URL" --stacktrace

      - name: Préparer le fichier
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk TrustDelivery.apk

      - name: Publier l’APK
        uses: actions/upload-artifact@v4
        with:
          name: TrustDelivery-Android
          path: TrustDelivery.apk
          if-no-files-found: error
          retention-days: 30
